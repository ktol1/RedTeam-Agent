    <line x1="0" y1="200" x2="1200" y2="200" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke-width="0.5"/>
    <line x1="0" y1="280" x2="1200" y2="280" stroke-width="0.5"/>
    <line x1="0" y1="320" x2="1200" y2="320" stroke-width="0.5"/>
    <line x1="0" y1="360" x2="1200" y2="360" stroke-width="0.5"/>
  </g>

  <!-- Decorative network nodes -->
  <g opacity="0.15" filter="url(#softGlow)">
    <circle cx="100" cy="80" r="4" fill="#ff4444"/>
    <circle cx="180" cy="150" r="3" fill="#58a6ff"/>
    <circle cx="60" cy="300" r="5" fill="#ff4444"/>
