  <text x="340" y="165" font-family="'Cascadia Code', 'Fira Code', monospace" font-size="12" fill="#7ee787">[+] gogo → 12 hosts alive, 47 open ports</text>
  <text x="340" y="185" font-family="'Cascadia Code', 'Fira Code', monospace" font-size="12" fill="#7ee787">[+] httpx → IIS/10.0, Apache Tomcat/9.0</text>
  <text x="340" y="205" font-family="'Cascadia Code', 'Fira Code', monospace" font-size="12" fill="#ffa657">[!] nuclei → CVE-2024-23897 [CRITICAL]</text>
  <text x="340" y="225" font-family="'Cascadia Code', 'Fira Code', monospace" font-size="12" fill="#7ee787">[+] nxc smb → DESKTOP-01 Pwn3d!</text>
  <text x="340" y="245" font-family="'Cascadia Code', 'Fira Code', monospace" font-size="12" fill="#ff7b72">[★] secretsdump → Administrator:500:aad3b...NTHASH</text>

  <text x="340" y="275" font-family="'Cascadia Code', 'Fira Code', monospace" font-size="13" fill="#ff7b72" filter="url(#glow)">[✓] Domain Compromised. Full report generated.</text>

  <!-- Blinking cursor -->
  <rect x="340" y="290" width="8" height="16" fill="#ff4444" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Bottom tagline -->
  <text x="600" y="380" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#8b949e" text-anchor="middle" letter-spacing="3">
    WHERE AI MEETS OFFENSIVE SECURITY
  </text>
</svg>
