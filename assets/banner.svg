  <text x="540" y="73" font-family="monospace" font-size="13" fill="#8b949e" text-anchor="middle">RedTeam-MCP Terminal</text>

  <!-- Terminal content -->
  <text x="340" y="110" font-family="'Cascadia Code', 'Fira Code', monospace" font-size="14" fill="#8b949e">$</text>
  <text x="356" y="110" font-family="'Cascadia Code', 'Fira Code', monospace" font-size="14" fill="#79c0ff"> ai</text>
