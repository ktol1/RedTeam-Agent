name: Sync To RED

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Push main to RED branch
        env:
          RED_SYNC_TOKEN: ${{ secrets.RED_SYNC_TOKEN }}
        run: |
          if [ -z "$RED_SYNC_TOKEN" ]; then
            echo "RED_SYNC_TOKEN is not set"
            exit 1
          fi
          git remote add red "https://x-access-token:${RED_SYNC_TOKEN}@github.com/ktol1/RED.git"
          git push red "HEAD:refs/heads/域skills" --force
